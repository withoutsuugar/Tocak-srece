<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Točak sreće</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #05000b);
      color: rgba(251, 248, 248, 0.732);
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .container {
      background: rgb(92, 95, 117);
      color: black;
      padding: 20px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    canvas {
      background: #fff;
      border-radius: 50%;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #633591;
      color: rgb(255, 254, 254);
      transition: 0.2s;
    }

    button:hover {
      background: #5a67d8;
    }

    input {
      width: 300px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    #winner {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 30px solid rgb(115, 15, 19);
      margin: auto;
    }
    .lemarie {
        font-family: 'Georgia', serif;
        font-size: 40px;
    }
  </style>
</head>
<body>

<h1 class="lemarie"> Točak sreće <br> <span style="color:  rgb(115, 15, 19);">lemaribellea</span></h1>

<div class="container">

  <input id="names" placeholder="Unesi imena">
  <br>
  <button onclick="initWheel()">Učitaj imena</button>

  <div class="pointer"></div>
  <canvas id="wheel" width="400" height="400"></canvas>

  <br>
  <button onclick="spin()">Zavrti!</button>

  <h2 id="winner"></h2>
</div>

<script>
let names = [];
let startAngle = 0;
let arc;
let spinning = false;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function initWheel() {
  const input = document.getElementById("names").value;
  names = input.split(",").map(n => n.trim()).filter(n => n !== "");

  if (names.length === 0) {
    alert("Unesi bar jedno ime!");
    return;
  }

  arc = Math.PI * 2 / names.length;
  startAngle = 0;
  drawWheel();
}

function drawWheel() {
  for (let i = 0; i < names.length; i++) {
    const angle = startAngle + i * arc;

    ctx.beginPath();
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, angle, angle + arc);
    ctx.fillStyle = `hsl(${i * 360 / names.length}, 70%, 60%)`;
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = "black";
    ctx.font = "14px Arial";
    ctx.fillText(names[i], 100, 5);
    ctx.restore();
  }
}

function spin() {
  if (spinning || names.length === 0) return;
  spinning = true;

  let spinAngle = Math.random() * 3000 + 2000;
  let duration = 4000;
  let start = null;

  function animate(timestamp) {
    if (!start) start = timestamp;
    let progress = timestamp - start;
    let angle = spinAngle * easeOut(progress / duration);

    startAngle = angle * Math.PI / 180;
    ctx.clearRect(0, 0, 400, 400);
    drawWheel();

    if (progress < duration) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      showWinner();
    }
  }

  requestAnimationFrame(animate);
}

function easeOut(t) {
  return t * (2 - t);
}

function showWinner() {
  const degrees = startAngle * 180 / Math.PI + 90;
  const index = Math.floor((360 - (degrees % 360)) / (360 / names.length));
  document.getElementById("winner").innerText = " Dobitnik: " + names[index];
}
</script>

</body>
</html>
